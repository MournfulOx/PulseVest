name: pulsevest
description: PulseVest 积川 - 美股定投复利计算器
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.68.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.2.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  min_sdk_android: 21
